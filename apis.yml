description: Fintecture is a French Open Banking payments platform and ACPR-authorised payment institution
  (#17248). Its API stack covers PSD2 Payment Initiation (Immediate Transfer, Smart Transfer, Request To Pay,
  Buy Now Pay Later, Verified Payout, Immediate Refund), PSD2 Account Information (accounts, holders, transactions,
  identity verification), Customers, E-Mandates, and a beta Organisation Access Credentials surface for managing
  multi-tenant enterprise estates. Clients include Auchan, Bricoman, Pluxee, PMU, and Edenred, with 2M+ end payers
  served. Plug-and-play modules for PrestaShop, Magento, Shopify, WordPress, Odoo, Intershop, and Oasis sit on
  top of official JavaScript, Python, PHP, and Ruby SDKs.
