  description: PSD2 Payment Initiation Services for Immediate Transfer, Smart Transfer (auto-reconciled with virtual
    IBANs), Request To Pay (payment links via email/SMS/QR), Buy Now Pay Later, and Verified Payout. The same
    /pis/v2/connect endpoint serves immediate transfers, smart transfers, and BNPL via a single Payment Hub
    abstraction. Production calls require HTTP message signature (RFC draft-cavage-http-signatures), digest, date,
    and x-request-id headers.
